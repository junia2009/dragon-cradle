<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="68%">
      <stop offset="0%"   stop-color="#1c0900"/>
      <stop offset="70%"  stop-color="#0a0200"/>
      <stop offset="100%" stop-color="#020101"/>
    </radialGradient>
    <!-- Fire gradient: gold top -> orange -> deep red bottom -->
    <linearGradient id="fire" x1="0" y1="100" x2="0" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFE040"/>
      <stop offset="28%"  stop-color="#FF9900"/>
      <stop offset="60%"  stop-color="#FF3300"/>
      <stop offset="100%" stop-color="#BB0000"/>
    </linearGradient>
    <!-- Bloom glow for text -->
    <filter id="glow" x="-14%" y="-55%" width="128%" height="210%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"  result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Ornament glow -->
    <filter id="oGlow" x="-40%" y="-100%" width="180%" height="300%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Ambient fire behind text -->
    <filter id="ambient" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Fire ambient blob behind text -->
  <ellipse cx="256" cy="255" rx="188" ry="148" fill="#FF3300" opacity="0.17" filter="url(#ambient)"/>
  <ellipse cx="256" cy="195" rx="130" ry="90"  fill="#FF6600" opacity="0.10" filter="url(#ambient)"/>
  <ellipse cx="256" cy="340" rx="150" ry="80"  fill="#FF2200" opacity="0.12" filter="url(#ambient)"/>

  <!-- ── Top ornament line + diamond ── -->
  <line x1="50"  y1="112" x2="220" y2="112" stroke="#FF5500" stroke-width="1.2" opacity="0.65"/>
  <polygon points="256,100 265,112 256,124 247,112" fill="#FF6600" opacity="1.0" filter="url(#oGlow)"/>
  <line x1="292" y1="112" x2="462" y2="112" stroke="#FF5500" stroke-width="1.2" opacity="0.65"/>
  <!-- Corner ticks -->
  <line x1="50"  y1="108" x2="50"  y2="116" stroke="#FF4400" stroke-width="1.2" opacity="0.55"/>
  <line x1="462" y1="108" x2="462" y2="116" stroke="#FF4400" stroke-width="1.2" opacity="0.55"/>

  <!-- ── DRAGON — glow shadow layer ── -->
  <text x="256" y="232"
    text-anchor="middle" textLength="432" lengthAdjust="spacing"
    font-family="Impact, 'Arial Black', 'Arial Narrow', sans-serif"
    font-size="124" font-weight="900"
    fill="#FF1100" opacity="0.60"
    filter="url(#glow)">DRAGON</text>

  <!-- ── DRAGON — main layer ── -->
  <text x="256" y="232"
    text-anchor="middle" textLength="432" lengthAdjust="spacing"
    font-family="Impact, 'Arial Black', 'Arial Narrow', sans-serif"
    font-size="124" font-weight="900"
    fill="url(#fire)">DRAGON</text>

  <!-- ── Middle ornament ── -->
  <line x1="50"  y1="268" x2="222" y2="268" stroke="#FF4400" stroke-width="1.0" opacity="0.45"/>
  <!-- left wing-tick -->
  <line x1="228" y1="261" x2="246" y2="268" stroke="#FF5500" stroke-width="1.2" opacity="0.65"/>
  <!-- center diamond -->
  <polygon points="256,258 263,268 256,278 249,268" fill="#FF6600" opacity="1.0" filter="url(#oGlow)"/>
  <!-- right wing-tick -->
  <line x1="266" y1="268" x2="284" y2="261" stroke="#FF5500" stroke-width="1.2" opacity="0.65"/>
  <line x1="290" y1="268" x2="462" y2="268" stroke="#FF4400" stroke-width="1.0" opacity="0.45"/>

  <!-- ── CRADLE — glow shadow layer ── -->
  <text x="256" y="366"
    text-anchor="middle" textLength="390" lengthAdjust="spacing"
    font-family="Impact, 'Arial Black', 'Arial Narrow', sans-serif"
    font-size="104" font-weight="900"
    fill="#FF1100" opacity="0.55"
    filter="url(#glow)">CRADLE</text>

  <!-- ── CRADLE — main layer ── -->
  <text x="256" y="366"
    text-anchor="middle" textLength="390" lengthAdjust="spacing"
    font-family="Impact, 'Arial Black', 'Arial Narrow', sans-serif"
    font-size="104" font-weight="900"
    fill="url(#fire)">CRADLE</text>

  <!-- ── Bottom ornament line + diamond ── -->
  <line x1="50"  y1="404" x2="220" y2="404" stroke="#FF5500" stroke-width="1.2" opacity="0.65"/>
  <polygon points="256,392 265,404 256,416 247,404" fill="#FF6600" opacity="1.0" filter="url(#oGlow)"/>
  <line x1="292" y1="404" x2="462" y2="404" stroke="#FF5500" stroke-width="1.2" opacity="0.65"/>
  <!-- Corner ticks -->
  <line x1="50"  y1="400" x2="50"  y2="408" stroke="#FF4400" stroke-width="1.2" opacity="0.55"/>
  <line x1="462" y1="400" x2="462" y2="408" stroke="#FF4400" stroke-width="1.2" opacity="0.55"/>

  <!-- Frame border -->
  <rect width="512" height="512" rx="88" fill="none"
    stroke="#FF4400" stroke-width="2.5" opacity="0.18"/>
</svg>