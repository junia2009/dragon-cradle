<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1e0635"/>
      <stop offset="100%" stop-color="#070b14"/>
    </radialGradient>
    <!-- Eye iris -->
    <radialGradient id="eyeR" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="35%" stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#cc1500"/>
    </radialGradient>
    <!-- Eye ambient glow -->
    <radialGradient id="eyeAmbL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5500" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff5500" stop-opacity="0"/>
    </radialGradient>
    <!-- Purple scale shimmer -->
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d45ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5a10cc" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Forehead gem -->
    <radialGradient id="gemGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff9933"/>
      <stop offset="60%" stop-color="#ff3300"/>
      <stop offset="100%" stop-color="#990000"/>
    </radialGradient>

    <!-- Glow filter (eye + gem) -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"  result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow filter (horns / border) -->
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="92" fill="url(#bgGrad)"/>

  <!-- ── Atmospheric eye glow halos ── -->
  <ellipse cx="198" cy="220" rx="68" ry="58" fill="url(#eyeAmbL)" filter="url(#glow)"/>
  <ellipse cx="314" cy="220" rx="68" ry="58" fill="url(#eyeAmbL)" filter="url(#glow)"/>

  <!-- ── Horns (back layer) ── -->
  <polygon points="168,90 145,18 208,128" fill="#3b1266" opacity="0.75"/>
  <polygon points="344,90 367,18 304,128" fill="#3b1266" opacity="0.75"/>

  <!-- ── Horns (front layer, glowing) ── -->
  <polygon points="188,98 168,22 224,122" fill="#8a30f5" filter="url(#softGlow)"/>
  <polygon points="324,98 344,22 288,122" fill="#8a30f5" filter="url(#softGlow)"/>

  <!-- ── Side spines ── -->
  <polygon points="148,150 120,108 162,178" fill="#6a1fc2" opacity="0.65"/>
  <polygon points="364,150 392,108 350,178" fill="#6a1fc2" opacity="0.65"/>

  <!-- ── Head base ── -->
  <path d="M256,100
    L308,112 L352,140 L378,178 L388,220
    L382,260 L360,288 L328,306 L292,316
    L256,320 L220,316 L184,306 L152,288
    L130,260 L124,220 L134,178 L160,140
    L204,112 Z"
    fill="#180636"/>

  <!-- ── Head scale shimmer overlay ── -->
  <path d="M256,100
    L308,112 L352,140 L378,178 L388,220
    L382,260 L360,288 L328,306 L292,316
    L256,320 L220,316 L184,306 L152,288
    L130,260 L124,220 L134,178 L160,140
    L204,112 Z"
    fill="url(#scaleGrad)" opacity="0.18"/>

  <!-- ── Head outline ── -->
  <path d="M256,100
    L308,112 L352,140 L378,178 L388,220
    L382,260 L360,288 L328,306 L292,316
    L256,320 L220,316 L184,306 L152,288
    L130,260 L124,220 L134,178 L160,140
    L204,112 Z"
    fill="none" stroke="#8a30f5" stroke-width="2.5" opacity="0.55"/>

  <!-- ── Brow ridge ── -->
  <path d="M138,192 L178,172 L224,176" fill="none" stroke="#5a1a9e" stroke-width="5" stroke-linecap="round"/>
  <path d="M374,192 L334,172 L288,176" fill="none" stroke="#5a1a9e" stroke-width="5" stroke-linecap="round"/>

  <!-- ── Scale lines ── -->
  <path d="M190,152 Q256,142 322,152" fill="none" stroke="#5218b0" stroke-width="1.5" opacity="0.5"/>
  <path d="M170,175 Q256,162 342,175" fill="none" stroke="#4a1090" stroke-width="1.2" opacity="0.4"/>

  <!-- ── Left eye ── -->
  <ellipse cx="198" cy="220" rx="36" ry="28" fill="url(#eyeR)" filter="url(#glow)"/>
  <ellipse cx="198" cy="220" rx="10"  ry="24" fill="#030010"/>
  <ellipse cx="198" cy="220" rx="36"  ry="28" fill="none" stroke="#ff8800" stroke-width="1.8" opacity="0.65"/>
  <!-- shine -->
  <ellipse cx="188" cy="209" rx="9" ry="5" fill="white" opacity="0.18" transform="rotate(-20 188 209)"/>

  <!-- ── Right eye ── -->
  <ellipse cx="314" cy="220" rx="36" ry="28" fill="url(#eyeR)" filter="url(#glow)"/>
  <ellipse cx="314" cy="220" rx="10"  ry="24" fill="#030010"/>
  <ellipse cx="314" cy="220" rx="36"  ry="28" fill="none" stroke="#ff8800" stroke-width="1.8" opacity="0.65"/>
  <!-- shine -->
  <ellipse cx="304" cy="209" rx="9" ry="5" fill="white" opacity="0.18" transform="rotate(20 304 209)"/>

  <!-- ── Nose bridge ── -->
  <path d="M228,256 L256,244 L284,256" fill="none" stroke="#42168e" stroke-width="3" stroke-linecap="round"/>
  <!-- Nostrils -->
  <ellipse cx="242" cy="264" rx="8" ry="6" fill="#0a0020" transform="rotate(-18 242 264)"/>
  <ellipse cx="270" cy="264" rx="8" ry="6" fill="#0a0020" transform="rotate(18 270 264)"/>

  <!-- ── Jaw ── -->
  <path d="M178,295 Q218,316 256,318 Q294,316 334,295"
    fill="none" stroke="#6a22b0" stroke-width="2.5" opacity="0.7"/>

  <!-- ── Neck / body silhouette ── -->
  <path d="M192,306 L170,390 L196,448 L256,462 L316,448 L342,390 L320,306"
    fill="#110228" opacity="0.55"/>
  <path d="M192,306 L170,390 L196,448 L256,462 L316,448 L342,390 L320,306"
    fill="none" stroke="#7B2FFF" stroke-width="1.5" opacity="0.30"/>

  <!-- ── Forehead gem (diamond) ── -->
  <polygon points="256,116 268,134 256,144 244,134"
    fill="url(#gemGrad)" filter="url(#glow)" opacity="0.85"/>
  <polygon points="256,120 265,133 256,141 247,133"
    fill="#ffcc55" opacity="0.45"/>

  <!-- ── Outer border glow ── -->
  <rect width="512" height="512" rx="92" fill="none"
    stroke="#8a30f5" stroke-width="3" opacity="0.30"/>
</svg>
