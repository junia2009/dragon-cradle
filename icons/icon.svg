<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="66%">
      <stop offset="0%"   stop-color="#1a0700"/>
      <stop offset="60%"  stop-color="#0a0200"/>
      <stop offset="100%" stop-color="#020101"/>
    </radialGradient>
    <radialGradient id="fireAmbient" cx="50%" cy="82%" r="68%">
      <stop offset="0%"   stop-color="#FF5500" stop-opacity="0.70"/>
      <stop offset="45%"  stop-color="#FF2200" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeG" cx="30%" cy="24%" r="70%">
      <stop offset="0%"   stop-color="#FFE040"/>
      <stop offset="42%"  stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#CC2000"/>
    </radialGradient>
    <filter id="bigBloom" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeBloom" x="-160%" y="-160%" width="420%" height="420%">
      <feGaussianBlur stdDeviation="13" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rimF" x="-16%" y="-16%" width="132%" height="132%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>
  <rect width="512" height="512" rx="88" fill="url(#fireAmbient)"/>

  <!-- Fire bloom layers -->
  <ellipse cx="256" cy="466" rx="210" ry="72"  fill="#FF5500" opacity="0.55" filter="url(#bigBloom)"/>
  <ellipse cx="256" cy="390" rx="155" ry="95"  fill="#FF4400" opacity="0.38" filter="url(#bigBloom)"/>
  <ellipse cx="256" cy="290" rx="100" ry="85"  fill="#FF2200" opacity="0.20" filter="url(#bigBloom)"/>
  <ellipse cx="256" cy="190" rx="55"  ry="55"  fill="#FF1100" opacity="0.10" filter="url(#bigBloom)"/>

  <!-- ========== LEFT WING ==========
       Leading edge: shoulder(192,242) → C(140,205)(68,145)(18,68) tip
       Trailing edge: tip(18,68) → S-curve down → bottom(80,386)
       Inner: Z (straight back to shoulder)
  -->
  <path d="
    M 192,242
    C 140,205 68,145 18,68
    C 44,132 54,198 58,260
    C 62,314 70,352 80,386
    Z
  " fill="#0c0200"/>

  <!-- ========== RIGHT WING (mirror) ========== -->
  <path d="
    M 320,242
    C 372,205 444,145 494,68
    C 468,132 458,198 454,260
    C 450,314 442,352 432,386
    Z
  " fill="#0c0200"/>

  <!-- Wing rim glow -->
  <path d="M 192,242 C 140,205 68,145 18,68 C 44,132 54,198 58,260 C 62,314 70,352 80,386 Z"
    fill="none" stroke="#FF3300" stroke-width="2" opacity="0.38" filter="url(#rimF)"/>
  <path d="M 320,242 C 372,205 444,145 494,68 C 468,132 458,198 454,260 C 450,314 442,352 432,386 Z"
    fill="none" stroke="#FF3300" stroke-width="2" opacity="0.38" filter="url(#rimF)"/>

  <!-- Wing membrane vein lines -->
  <line x1="192" y1="242" x2="18"  y2="68"  stroke="#FF4400" stroke-width="1.3" opacity="0.20"/>
  <line x1="162" y1="258" x2="48"  y2="148" stroke="#FF3300" stroke-width="1.0" opacity="0.14"/>
  <line x1="133" y1="284" x2="58"  y2="226" stroke="#FF2200" stroke-width="0.9" opacity="0.10"/>
  <line x1="320" y1="242" x2="494" y2="68"  stroke="#FF4400" stroke-width="1.3" opacity="0.20"/>
  <line x1="350" y1="258" x2="464" y2="148" stroke="#FF3300" stroke-width="1.0" opacity="0.14"/>
  <line x1="379" y1="284" x2="454" y2="226" stroke="#FF2200" stroke-width="0.9" opacity="0.10"/>

  <!-- ========== BODY ==========
       Top: x[212,300] at y~238 (between wing shoulders)
       Bottom: narrowing to hips, legs implied
  -->
  <path d="
    M 212,238
    C 198,262 192,304 194,346
    C 196,382 206,414 218,440
    L 228,454 C 234,462 246,466 256,466
    C 266,466 278,462 284,454 L 294,440
    C 306,414 316,382 318,346
    C 320,304 314,262 300,238
    C 282,232 268,230 256,230
    C 244,230 226,232 212,238 Z
  " fill="#0e0300"/>
  <path d="
    M 212,238 C 198,262 192,304 194,346 C 196,382 206,414 218,440
    L 228,454 C 234,462 246,466 256,466 C 266,466 278,462 284,454 L 294,440
    C 306,414 316,382 318,346 C 320,304 314,262 300,238
    C 282,232 268,230 256,230 C 244,230 226,232 212,238 Z
  " fill="none" stroke="#FF4400" stroke-width="2" opacity="0.48" filter="url(#rimF)"/>

  <!-- Belly scale highlight -->
  <path d="M 238,260 C 244,256 256,255 268,256 L 272,340 C 268,368 262,388 256,394 C 250,388 244,368 240,340 Z"
    fill="#160500" opacity="0.75"/>

  <!-- ========== NECK ========== -->
  <path d="
    M 234,210 C 228,220 225,234 227,242 L 285,242
    C 287,234 284,220 278,210 Z
  " fill="#0e0300"/>

  <!-- ========== HEAD ==========
       Oval, front-facing, spans x[194,318] y[96,212]
  -->
  <path d="
    M 256,96
    C 282,96 304,108 314,128
    C 324,148 322,172 312,188
    C 302,202 282,210 256,212
    C 230,210 210,202 200,188
    C 190,172 188,148 198,128
    C 208,108 230,96 256,96 Z
  " fill="#0e0300"/>
  <path d="
    M 256,96 C 282,96 304,108 314,128 C 324,148 322,172 312,188
    C 302,202 282,210 256,212 C 230,210 210,202 200,188
    C 190,172 188,148 198,128 C 208,108 230,96 256,96 Z
  " fill="none" stroke="#FF5500" stroke-width="2.2" opacity="0.58" filter="url(#rimF)"/>

  <!-- ========== HORNS ==========
       Left:  points 228,112 → 202,26 → 241,107
       Right: points 284,112 → 310,26 → 271,107
  -->
  <polygon points="228,112 202,26 241,107" fill="#0c0200"/>
  <polygon points="228,112 202,26 241,107" fill="none" stroke="#FF4400" stroke-width="1.8" opacity="0.60" filter="url(#rimF)"/>
  <polygon points="284,112 310,26 271,107" fill="#0c0200"/>
  <polygon points="284,112 310,26 271,107" fill="none" stroke="#FF4400" stroke-width="1.8" opacity="0.60" filter="url(#rimF)"/>

  <!-- ========== SNOUT / JAW ========== -->
  <path d="
    M 234,192 C 238,200 246,206 256,207
    C 266,206 274,200 278,192
    L 283,198 C 279,210 268,216 256,216
    C 244,216 233,210 229,198 Z
  " fill="#0a0200"/>
  <!-- Nostrils -->
  <ellipse cx="243" cy="197" rx="5.5" ry="3.5" fill="#060100" transform="rotate(-14 243 197)"/>
  <ellipse cx="269" cy="197" rx="5.5" ry="3.5" fill="#060100" transform="rotate(14 269 197)"/>

  <!-- ========== BROW RIDGES (V-shape, angry) ========== -->
  <path d="M 203,126 L 224,112 L 246,120" fill="none"
    stroke="#FF4400" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
  <path d="M 309,126 L 288,112 L 266,120" fill="none"
    stroke="#FF4400" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>

  <!-- ========== EYES ========== -->
  <!-- Left halo -->
  <ellipse cx="232" cy="150" rx="24" ry="18" fill="#FF6600" opacity="0.30" filter="url(#eyeBloom)"/>
  <!-- Left iris -->
  <ellipse cx="232" cy="150" rx="17" ry="13" fill="url(#eyeG)" filter="url(#eyeBloom)"/>
  <!-- Left pupil slit -->
  <ellipse cx="232" cy="150" rx="4.5" ry="11" fill="#020006"/>
  <!-- Left specular -->
  <ellipse cx="226" cy="143" rx="5.5" ry="3" fill="white" opacity="0.24" transform="rotate(-16 226 143)"/>
  <!-- Left outline -->
  <ellipse cx="232" cy="150" rx="17" ry="13" fill="none" stroke="#FF8800" stroke-width="1.4" opacity="0.54"/>

  <!-- Right halo -->
  <ellipse cx="280" cy="150" rx="24" ry="18" fill="#FF6600" opacity="0.30" filter="url(#eyeBloom)"/>
  <!-- Right iris -->
  <ellipse cx="280" cy="150" rx="17" ry="13" fill="url(#eyeG)" filter="url(#eyeBloom)"/>
  <!-- Right pupil slit -->
  <ellipse cx="280" cy="150" rx="4.5" ry="11" fill="#020006"/>
  <!-- Right specular -->
  <ellipse cx="274" cy="143" rx="5.5" ry="3" fill="white" opacity="0.24" transform="rotate(-16 274 143)"/>
  <!-- Right outline -->
  <ellipse cx="280" cy="150" rx="17" ry="13" fill="none" stroke="#FF8800" stroke-width="1.4" opacity="0.54"/>

  <!-- ========== SPINE RIDGES ========== -->
  <polygon points="250,97  245,74 256,93"  fill="#FF5500" opacity="0.55"/>
  <polygon points="256,92  252,68 260,90"  fill="#FF5500" opacity="0.62"/>
  <polygon points="262,97  259,74 267,93"  fill="#FF5500" opacity="0.55"/>
  <polygon points="250,217 246,238 256,228 266,238 262,217" fill="#FF3300" opacity="0.30"/>
  <polygon points="250,280 246,302 256,292 266,302 262,280" fill="#FF2200" opacity="0.20"/>
  <polygon points="250,350 246,372 256,362 266,372 262,350" fill="#FF1100" opacity="0.13"/>

  <!-- ========== TAIL ========== -->
  <path d="
    M 296,448
    C 322,458 354,460 376,442
    C 396,424 396,402 380,392
    C 364,382 348,392 346,408
    C 344,422 356,430 370,426 L 380,418
  " fill="none" stroke="#0e0300" stroke-width="24" stroke-linecap="round"/>
  <path d="
    M 296,448
    C 322,458 354,460 376,442
    C 396,424 396,402 380,392
    C 364,382 348,392 346,408
    C 344,422 356,430 370,426 L 380,418
  " fill="none" stroke="#FF3300" stroke-width="1.8" opacity="0.38" stroke-linecap="round"/>

  <!-- ========== LEGS + CLAWS ========== -->
  <!-- Left leg -->
  <path d="M 216,442 C 208,455 200,468 194,478
    C 206,484 220,480 228,470
    C 232,480 238,488 248,484
    C 244,472 238,460 232,448 Z" fill="#0d0200"/>
  <path d="M 216,442 C 208,455 200,468 194,478 C 206,484 220,480 228,470 C 232,480 238,488 248,484 C 244,472 238,460 232,448 Z"
    fill="none" stroke="#FF3300" stroke-width="1.2" opacity="0.32"/>
  <!-- Right leg -->
  <path d="M 296,442 C 304,455 312,468 318,478
    C 306,484 292,480 284,470
    C 280,480 274,488 264,484
    C 268,472 274,460 280,448 Z" fill="#0d0200"/>
  <path d="M 296,442 C 304,455 312,468 318,478 C 306,484 292,480 284,470 C 280,480 274,488 264,484 C 268,472 274,460 280,448 Z"
    fill="none" stroke="#FF3300" stroke-width="1.2" opacity="0.32"/>

  <!-- Frame -->
  <rect width="512" height="512" rx="88" fill="none"
    stroke="#FF2200" stroke-width="2.5" opacity="0.14"/>
</svg>